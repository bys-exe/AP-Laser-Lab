
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Laser Action Virtual Lab</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cdefs%3E%3ClinearGradient id='grad' x1='0%25' y1='0%25' x2='100%25' y2='0%25'%3E%3Cstop offset='0%25' style='stop-color:%2306b6d4;stop-opacity:1' /%3E%3Cstop offset='100%25' style='stop-color:%2300f2ff;stop-opacity:1' /%3E%3C/linearGradient%3E%3C/defs%3E%3Ccircle cx='16' cy='16' r='14' fill='none' stroke='url(%23grad)' stroke-width='2'/%3E%3Cpath d='M8 16 L24 16 M16 8 L16 24' stroke='url(%23grad)' stroke-width='3' stroke-linecap='round'/%3E%3Ccircle cx='16' cy='16' r='3' fill='%2306b6d4'/%3E%3C/svg%3E" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
      body { font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; }
      
      /* Reset range input to show our custom track and thumb */
      input[type=range] {
        -webkit-appearance: none;
        width: 100%;
        background: transparent;
        margin: 10px 0;
      }
      input[type=range]:focus {
        outline: none;
      }

      /* Track Styling */
      input[type=range]::-webkit-slider-runnable-track {
        width: 100%;
        height: 8px;
        cursor: pointer;
        background: #1e293b; /* slate-800 */
        border-radius: 10px;
        border: 1px solid #475569; /* slate-600 */
      }
      input[type=range]::-moz-range-track {
        width: 100%;
        height: 8px;
        cursor: pointer;
        background: #1e293b;
        border-radius: 10px;
        border: 1px solid #475569;
      }

      /* Thumb Styling */
      input[type=range]::-webkit-slider-thumb {
        height: 24px;
        width: 24px;
        border-radius: 50%;
        background: #f43f5e; /* rose-500 */
        cursor: pointer;
        -webkit-appearance: none;
        margin-top: -9px; /* Centers thumb on track */
        box-shadow: 0 0 15px rgba(244, 63, 94, 0.6), inset 0 0 5px white;
        border: 2px solid white;
        transition: transform 0.1s ease;
      }
      input[type=range]::-webkit-slider-thumb:active {
        transform: scale(1.2);
      }
      input[type=range]::-moz-range-thumb {
        height: 24px;
        width: 24px;
        border-radius: 50%;
        background: #f43f5e;
        cursor: pointer;
        box-shadow: 0 0 15px rgba(244, 63, 94, 0.6);
        border: 2px solid white;
      }

      @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
      .animate-stage { animation: fadeIn 0.4s ease-out forwards; }
      
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }

      /* Custom animations for cavity */
      @keyframes laserBounce {
        0%, 100% { left: 5%; }
        50% { left: 95%; }
      }
      .animate-laser-bounce {
        animation: laserBounce 2s linear infinite;
      }
    </style>
</head>
  <body>
    <div id="root"></div>
  <script type="module" src="/src/index.tsx"></script>
</body>
</html>
